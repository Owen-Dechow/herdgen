services:
  django:
    image: owendechow/herdgen-django
    command: python3 manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app/
    ports:
      - 8000:8000
  django-background-tasks:
    image: owendechow/herdgen-django-background-tasks
    command: python3 manage.py process_tasks
    volumes:
      - .:/app/
